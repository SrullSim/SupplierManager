name: supplier_manager
description: Multi-branch supplier ordering app (factory + branch interfaces).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # HTTP
  dio: ^5.5.0

  # Local storage (JWT)
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # i18n
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # enables gen-l10n from ARB files
