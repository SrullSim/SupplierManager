include: package:flutter_lints/flutter.yaml

linter:
  rules:
    prefer_const_constructors: true
    prefer_final_locals: true
    avoid_print: true
    # Note: trailing commas are managed by `dart format`, so we don't
    # enable require_trailing_commas (it conflicts with the formatter).

analyzer:
  errors:
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "lib/l10n/generated/**"
